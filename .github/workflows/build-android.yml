name: Build Android APK (self-build, unsigned)

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-android:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: "temurin"
          java-version: "17"

      - name: Install web app dependencies
        # --ignore-scripts skips the Electron-specific postinstall
        # (native module rebuild) which isn't needed for the web/Android build
        run: yarn install --ignore-scripts --network-timeout 600000

      - name: Use a stable debug signing key
        # Without this, every CI run gets a fresh random debug keystore,
        # so a newly built APK cannot be installed over a previously
        # installed one (Android blocks it as a signature mismatch) and
        # installs silently fail, leaving the old app in place.
        run: |
          mkdir -p ~/.android
          cp android-debug.keystore ~/.android/debug.keystore

      - name: Build production web bundle
        id: web_build
        env:
          CI: false
        run: |
          set -o pipefail
          yarn build 2>&1 | tee /tmp/build.log

      - name: Report build log on failure
        if: failure() && steps.web_build.outcome == 'failure'
        run: |
          BODY=$(tail -c 60000 /tmp/build.log | python3 -c "import json,sys; print(json.dumps(sys.stdin.read()))")
          curl -sf -X POST \
            -H "Authorization: token ${{ secrets.GITHUB_TOKEN }}" \
            -H "Accept: application/vnd.github+json" \
            "https://api.github.com/repos/${{ github.repository }}/commits/${{ github.sha }}/comments" \
            -d "{\"body\": ${BODY}}" || echo "Failed to post build log comment"

      - name: Install Capacitor
        run: yarn add --dev --ignore-scripts --network-timeout 600000 @capacitor/core@^6 @capacitor/android@^6 @capacitor/cli@^6

      - name: Add Android platform
        run: npx cap add android

      - name: Sync web build into Android project
        run: npx cap sync android

      - name: Build debug APK
        working-directory: android
        run: |
          chmod +x gradlew
          ./gradlew assembleDebug --no-daemon

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: koodo-reader-debug-apk
          path: android/app/build/outputs/apk/debug/app-debug.apk
